# Optional seed Job — opt-in via `manage.sh seed`. Reuses the migrate image
# because it already has tsx + the source tree under /app/backend/src.
#
# Idempotent: seed.ts upserts the demo user and replaces only that user's
# boards. Real Auth0 users are never touched.
apiVersion: batch/v1
kind: Job
metadata:
  name: backend-seed
  namespace: taskboard
  labels:
    app.kubernetes.io/name: backend-seed
    app.kubernetes.io/part-of: task-board
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-seed
        app.kubernetes.io/part-of: task-board
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: postgres-credentials
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                sleep 2
              done
      containers:
        - name: seed
          image: task-board-backend-migrate:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ['npm', 'run', 'db:seed', '-w', 'backend']
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
