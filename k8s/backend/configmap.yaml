apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: taskboard
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: task-board
data:
  NODE_ENV: production
  PORT: '3000'
  HOST: 0.0.0.0
  LOG_LEVEL: info
  # Frontend proxies /api/* to the backend Service, so the browser sees
  # same-origin requests. CORS_ORIGIN can therefore stay narrow.
  CORS_ORIGIN: http://localhost:30080
