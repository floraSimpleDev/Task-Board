# Copy to secret.yaml (gitignored) and fill in real values, OR let manage.sh
# generate it from k8s/.env.
#
# DATABASE_URL must match the postgres-credentials secret:
#   postgresql://<POSTGRES_USER>:<POSTGRES_PASSWORD>@postgres:5432/<POSTGRES_DB>
#
# AUTH0_DOMAIN: your tenant, e.g. your-tenant.us.auth0.com (no scheme)
# AUTH0_AUDIENCE: the API identifier configured in Auth0
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: taskboard
type: Opaque
stringData:
  DATABASE_URL: postgresql://postgres:replace-me@postgres:5432/taskboard
  AUTH0_DOMAIN: your-tenant.us.auth0.com
  AUTH0_AUDIENCE: https://task-board.local/api
