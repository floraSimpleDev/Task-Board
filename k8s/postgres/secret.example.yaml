# Copy to secret.yaml (gitignored) and fill in real values, OR let manage.sh
# generate it from k8s/.env. The same POSTGRES_USER / POSTGRES_PASSWORD /
# POSTGRES_DB must match the DATABASE_URL in the backend secret.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: taskboard
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: replace-me
  POSTGRES_DB: taskboard
