apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: taskboard
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: task-board
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: task-board
    spec:
      containers:
        - name: frontend
          image: task-board-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            # nginx envsubst replaces ${BACKEND_URL} in the templated config
            # at container start. backend Service is ClusterIP on port 3000.
            - name: BACKEND_URL
              value: http://backend.taskboard.svc.cluster.local:3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
