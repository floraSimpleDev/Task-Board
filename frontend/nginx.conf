server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API calls to the backend Service. BACKEND_URL is templated by the
    # entrypoint at container start so the same image works in docker-compose
    # (http://backend:3000) and Kubernetes (http://task-board-backend.taskboard.svc.cluster.local:3000).
    location /api/ {
        proxy_pass ${BACKEND_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: fall back to index.html for any unmatched route (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
